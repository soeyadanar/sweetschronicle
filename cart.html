<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweets Chronicle</title>
    <link rel="stylesheet" href="style.css" />
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>
    <header>
        <nav class="top-menu">
            <div class="logo">Sweets<br>Chronicle</div>

            <!-- Mobile Menu Button -->
            <div class="menu-btn" id="menu-btn">☰</div>

            <ul id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li>
                    <a href="cart.html" class="cart-link" aria-label="Cart">
                        <svg class="cart-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 4h-2l-1 2h2l3.6 7.6-1.35 2.45
                                c-.16.28-.25.61-.25.95
                                0 1.1.9 2 2 2h12v-2h-12
                                c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45
                                c.75 0 1.41-.41 1.75-1.03l3.58-6.49
                                c.08-.14.12-.31.12-.48
                                0-.55-.45-1-1-1h-16zm0 16
                                c-1.1 0-1.99.9-1.99 2
                                s.89 2 1.99 2
                                2-.9 2-2-.9-2-2-2zm10
                                0c-1.1 0-1.99.9-1.99 2
                                s.89 2 1.99 2
                                2-.9 2-2-.9-2-2-2z" />
                        </svg>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- CART SECTION -->
    <section class="cart">
  <div class="cart-items">
    <!-- ITEMS APPEAR HERE -->
  </div>

  <aside class="order-summary">
    <h3>注文内容</h3>

    <div class="summary-row">
      <span>小計</span>
      <span id="subtotal">¥0</span>
    </div>

      <div class="coupon">
      <input type="text" placeholder="クーポンコード">
      <button>適用</button>
      </div>
      
    <div class="summary-row total">
      <span>合計</span>
      <span id="total">¥0</span>
    </div>

    <button class="checkout-btn">注文する</button>
  </aside>
</section>

<script src="cart.js"></script>

    <!-- FOOTER -->
    <footer>
        <div class="footer-inner">
            <div class="footer-title">Sweets Chronicle</div>
            <p class="footer-desc">
                Timeless desserts crafted across eras.  
                Taste the universe, one story at a time.
            </p>

            <div class="footer-links">
               <a href="pastsweets.html">Past Sweets</a>
                <a href="presentsweets.html">Present Sweets</a>
                <a href="futuresweets.html">Future Sweets</a>
            </div>

            <p class="copyright">
                © 2025 Sweets Chronicle. All Rights Reserved.
            </p>
        </div>
    </footer>

    <!-- Mobile Menu Toggle Script -->
    <script src="cart.js"> </script>
    <script>
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("menu-btn");
  const menu = document.querySelector("header nav");

  if (!btn || !menu) return;

  btn.addEventListener("click", () => {
    menu.classList.toggle("active");
  });
});
</script>
</body>
</html>
